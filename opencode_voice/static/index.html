<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenCode Voice</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="toolbar">
        <div class="brand">
          <span class="dot" id="statusDot"></span>
          <div>
            <h1>OpenCode Voice</h1>
            <p id="statusText">Connecting</p>
          </div>
        </div>
        <label class="session-picker">
          <span>Thread</span>
          <select id="sessionSelect"></select>
        </label>
        <button id="refreshBtn" type="button" title="Refresh sessions">Refresh</button>
        <label class="toggle">
          <input id="keepFork" type="checkbox" />
          <span>Keep fork</span>
        </label>
        <button id="startBtn" type="button">Start fork</button>
        <button id="stopBtn" type="button" disabled>End</button>
        <button id="micBtn" type="button" disabled>Mic</button>
      </section>

      <section class="metrics">
        <div><span>Model</span><strong id="modelText">-</strong></div>
        <div><span>Context</span><strong id="tokenText">-</strong></div>
        <div><span>Compaction</span><strong id="compactionText">Idle</strong></div>
        <div><span>TTS</span><strong id="ttsText">Idle</strong></div>
      </section>

      <section class="work">
        <aside class="voice-panel">
          <div class="turn-box">
            <h2>Transcript</h2>
            <div id="transcript" class="scroll"></div>
          </div>
          <div class="turn-box">
            <h2>Assistant</h2>
            <div id="assistant" class="scroll"></div>
          </div>
          <form id="textForm" class="prompt-row">
            <input id="textPrompt" type="text" autocomplete="off" placeholder="Type a fallback prompt" />
            <button type="submit" disabled id="sendTextBtn">Send</button>
          </form>
        </aside>
        <iframe id="opencodeFrame" title="OpenCode"></iframe>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
